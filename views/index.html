<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload File Irfan - Cloud Storage</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        max-width: 500px;
        width: 100%;
        backdrop-filter: blur(10px);
        animation: fadeIn 0.5s ease-in;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        text-align: center;
        margin-bottom: 35px;
      }

      .header i {
        font-size: 48px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 15px;
      }

      .header h1 {
        color: #2d3748;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .header p {
        color: #718096;
        font-size: 14px;
        font-weight: 400;
      }

      .upload-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .form-group label {
        color: #4a5568;
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .form-group label i {
        color: #667eea;
        font-size: 16px;
      }

      .file-input-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
        width: 100%;
      }

      .file-input-wrapper input[type="file"] {
        position: absolute;
        left: -9999px;
      }

      .file-input-label {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 20px;
        background: #f7fafc;
        border: 2px dashed #cbd5e0;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
        color: #718096;
        font-weight: 500;
      }

      .file-input-label:hover {
        border-color: #667eea;
        background: #edf2f7;
        color: #667eea;
      }

      .file-input-label i {
        font-size: 24px;
      }

      .file-name {
        margin-top: 8px;
        padding: 8px 12px;
        background: #e6fffa;
        border-radius: 8px;
        color: #234e52;
        font-size: 13px;
        display: none;
      }

      .file-name.show {
        display: block;
      }

      .form-group input[type="text"] {
        padding: 14px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
        font-family: "Inter", sans-serif;
        transition: all 0.3s ease;
        color: #2d3748;
      }

      .form-group input[type="text"]:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .upload-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 16px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 10px;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      }

      .upload-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
      }

      .upload-btn:active {
        transform: translateY(0);
      }

      .upload-btn i {
        font-size: 18px;
      }

      .features {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        margin-top: 30px;
        padding-top: 30px;
        border-top: 1px solid #e2e8f0;
      }

      .feature {
        text-align: center;
        padding: 15px;
        background: #f7fafc;
        border-radius: 12px;
        transition: all 0.3s ease;
      }

      .feature:hover {
        background: #edf2f7;
        transform: translateY(-3px);
      }

      .feature i {
        font-size: 24px;
        color: #667eea;
        margin-bottom: 8px;
      }

      .feature span {
        display: block;
        font-size: 12px;
        color: #718096;
        font-weight: 500;
      }

      @media (max-width: 600px) {
        .container {
          padding: 30px 20px;
        }

        .header h1 {
          font-size: 24px;
        }

        .features {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <i class="fas fa-cloud-upload-alt"></i>
        <h1>Upload File ke S3</h1>
        <p>Kelola file Anda dengan mudah dan aman</p>
      </div>

      <form
        class="upload-form"
        action="/upload"
        method="POST"
        enctype="multipart/form-data"
      >
        <div class="form-group">
          <label>
            <i class="fas fa-file"></i>
            Pilih File
          </label>
          <div class="file-input-wrapper">
            <input type="file" name="file" id="fileInput" required />
            <label for="fileInput" class="file-input-label">
              <i class="fas fa-cloud-upload-alt"></i>
              <span>Klik atau drag file ke sini</span>
            </label>
          </div>
          <div class="file-name" id="fileName"></div>
        </div>

        <div class="form-group">
          <label>
            <i class="fas fa-edit"></i>
            Deskripsi File
          </label>
          <input
            type="text"
            name="description"
            placeholder="Masukkan deskripsi file (opsional)"
          />
        </div>

        <button type="submit" class="upload-btn">
          <i class="fas fa-upload"></i>
          Upload File
        </button>
      </form>

      <div class="features">
        <div class="feature">
          <i class="fas fa-lock"></i>
          <span>Aman</span>
        </div>
        <div class="feature">
          <i class="fas fa-bolt"></i>
          <span>Cepat</span>
        </div>
        <div class="feature">
          <i class="fas fa-shield-alt"></i>
          <span>Terpercaya</span>
        </div>
      </div>
    </div>

    <script>
      // Show selected file name
      const fileInput = document.getElementById("fileInput");
      const fileName = document.getElementById("fileName");

      fileInput.addEventListener("change", function (e) {
        if (this.files && this.files[0]) {
          const file = this.files[0];
          const fileSize = (file.size / 1024 / 1024).toFixed(2);
          fileName.textContent = `📁 ${file.name} (${fileSize} MB)`;
          fileName.classList.add("show");
        }
      });

      // Drag and drop functionality
      const fileInputLabel = document.querySelector(".file-input-label");

      ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
        fileInputLabel.addEventListener(eventName, preventDefaults, false);
      });

      function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      ["dragenter", "dragover"].forEach((eventName) => {
        fileInputLabel.addEventListener(eventName, highlight, false);
      });

      ["dragleave", "drop"].forEach((eventName) => {
        fileInputLabel.addEventListener(eventName, unhighlight, false);
      });

      function highlight(e) {
        fileInputLabel.style.borderColor = "#667eea";
        fileInputLabel.style.background = "#edf2f7";
      }

      function unhighlight(e) {
        fileInputLabel.style.borderColor = "#cbd5e0";
        fileInputLabel.style.background = "#f7fafc";
      }

      fileInputLabel.addEventListener("drop", handleDrop, false);

      function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        fileInput.files = files;

        if (files.length > 0) {
          const file = files[0];
          const fileSize = (file.size / 1024 / 1024).toFixed(2);
          fileName.textContent = `📁 ${file.name} (${fileSize} MB)`;
          fileName.classList.add("show");
        }
      }
    </script>
  </body>
</html>
